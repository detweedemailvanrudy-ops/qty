<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meting Registratie</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-color: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --border-color: #dddddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1, h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .card {
            background: var(--card-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background: #fafafa;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            background-color: #357abd;
        }

        /* Accordion Stijlen */
        .day-group {
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .day-header {
            background: #f8f9fa;
            padding: 12px 15px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .day-header:active {
            background: #f0f2f5;
        }

        .day-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            justify-content: space-between;
            margin-right: 15px;
        }

        .day-total {
            font-size: 0.9rem;
            color: var(--primary-color);
            background: rgba(74, 144, 226, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
        }

        .day-header::after {
            content: '▼';
            font-size: 0.75rem;
            transition: transform 0.2s;
            color: #666;
        }

        .day-group.open .day-header::after {
            transform: rotate(180deg);
        }

        .day-content {
            display: none;
            background: #fff;
            border-top: 1px solid var(--border-color);
        }

        .day-group.open .day-content {
            display: block;
        }

        .log-item {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-time {
            font-size: 0.95rem;
            color: #555;
        }

        .log-weight {
            font-size: 1.1rem;
            font-weight: 700;
            color: #111;
        }

        .empty-state {
            color: #888;
            text-align: center;
            font-style: italic;
            padding: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Invoer Formulier -->
    <div class="card">
        <h1>Nieuwe Registratie</h1>
        <form id="registrationForm">
            <div class="form-group">
                <label for="date">Datum</label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label for="time">Tijd</label>
                <input type="time" id="time" required>
            </div>
            
            <div class="form-group">
                <label for="weight">Gewicht (gram)</label>
                <input type="number" id="weight" step="0.01" min="0.01" max="9.99" placeholder="0.00" required>
            </div>
            
            <button type="submit">Opslaan</button>
        </form>
    </div>

    <!-- Historie Overzicht -->
    <div class="card">
        <h2>Geschiedenis</h2>
        <div id="historyContainer">
            <!-- Dynamische klapmenu's komen hier -->
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('registrationForm');
    const dateInput = document.getElementById('date');
    const timeInput = document.getElementById('time');
    const weightInput = document.getElementById('weight');
    const historyContainer = document.getElementById('historyContainer');

    function setDefaultDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        dateInput.value = `${year}-${month}-${day}`;
        
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        timeInput.value = `${hours}:${minutes}`;
    }

    function getRegistrations() {
        const data = localStorage.getItem('registrations');
        return data ? JSON.parse(data) : [];
    }

    function formatLongDate(dateString) {
        const [year, month, day] = dateString.split('-');
        const dateObj = new Date(Date.UTC(year, month - 1, day));
        
        const opties = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        let formatted = dateObj.toLocaleDateString('nl-NL', opties);
        
        return formatted.charAt(0).toUpperCase() + formatted.slice(1);
    }

    function renderList() {
        const registrations = getRegistrations();
        historyContainer.innerHTML = '';

        if (registrations.length === 0) {
            historyContainer.innerHTML = '<div class="empty-state">Nog geen registraties aanwezig.</div>';
            return;
        }

        // 1. Sorteer alle metingen chronologisch (nieuwste eerst)
        registrations.sort((a, b) => new Date(`${b.date}T${b.time}`) - new Date(`${a.date}T${a.time}`));

        // 2. Groepeer metingen per unieke datum
        const groups = {};
        registrations.forEach(item => {
            if (!groups[item.date]) {
                groups[item.date] = [];
            }
            groups[item.date].push(item);
        });

        // 3. Sorteer de unieke datums zelf ook van nieuw naar oud
        const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));

        sortedDates.forEach((dateKey, index) => {
            const dayGroup = document.createElement('div');
            dayGroup.className = `day-group ${index === 0 ? 'open' : ''}`;

            // Bereken het totaal voor deze specifieke dag
            const totalWeight = groups[dateKey].reduce((sum, item) => sum + parseFloat(item.weight), 0);

            const header = document.createElement('div');
            header.className = 'day-header';
            
            // Maak de structuur voor de tekst en het dagtotaal badge
            header.innerHTML = `
                <div class="day-info">
                    <span>${formatLongDate(dateKey)}</span>
                    <span class="day-total">${totalWeight.toFixed(2)} g</span>
                </div>
            `;

            const content = document.createElement('div');
            content.className = 'day-content';

            // Voeg de individuele metingen toe
            groups[dateKey].forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'log-item';
                itemDiv.innerHTML = `
                    <span class="log-time">${item.time} uur</span>
                    <span class="log-weight">${parseFloat(item.weight).toFixed(2)} g</span>
                `;
                content.appendChild(itemDiv);
            });

            header.addEventListener('click', () => {
                dayGroup.classList.toggle('open');
            });

            dayGroup.appendChild(header);
            dayGroup.appendChild(content);
            historyContainer.appendChild(dayGroup);
        });
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const newRegistration = {
            date: dateInput.value,
            time: timeInput.value,
            weight: parseFloat(weightInput.value).toFixed(2)
        };

        const registrations = getRegistrations();
        registrations.push(newRegistration);
        localStorage.setItem('registrations', JSON.stringify(registrations));

        weightInput.value = '';
        setDefaultDateTime();
        renderList();
    });

    // PWA Service Worker registratie script
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('Service Worker geregistreerd.'))
            .catch((err) => console.log('Service Worker mislukt:', err));
    }

    setDefaultDateTime();
    renderList();
</script>

</body>
</html>
